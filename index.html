<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FI Jobs Dashboard</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
      --accent: #38bdf8; --green: #4ade80; --red: #f87171;
      --yellow: #fbbf24; --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px 24px; min-height: 100vh;
    }
    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }
    .subtitle span { color: var(--accent); font-weight: 600; }

    /* Filters */
    .filters {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 16px; align-items: center;
    }
    .filters input, .filters select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 6px 10px;
      font-size: 0.82rem; outline: none;
    }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }
    .filters input[type="text"] { width: 220px; }
    .filters select { cursor: pointer; }

    /* Multi-select dropdown */
    .multi-select { position: relative; display: inline-block; }
    .multi-select-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 6px 28px 6px 10px;
      font-size: 0.82rem; cursor: pointer; min-width: 160px; max-width: 220px;
      text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      position: relative; user-select: none;
    }
    .multi-select-btn::after {
      content: '▾'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 0.7rem; color: var(--dim); pointer-events: none;
    }
    .multi-select-btn.open { border-color: var(--accent); }
    .multi-select-btn .count-badge {
      background: var(--accent); color: #000; border-radius: 10px; padding: 1px 6px;
      font-size: 0.7rem; font-weight: 700; margin-left: 4px;
    }
    .multi-select-panel {
      display: none; position: absolute; top: 100%; left: 0; z-index: 10;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      margin-top: 4px; min-width: 240px; max-height: 320px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .multi-select-panel.open { display: block; }
    .multi-select-search {
      width: 100%; border: none; border-bottom: 1px solid var(--border);
      background: transparent; color: var(--text); padding: 8px 10px;
      font-size: 0.8rem; outline: none; box-sizing: border-box;
    }
    .multi-select-options { max-height: 260px; overflow-y: auto; padding: 4px 0; }
    .multi-select-option {
      display: flex; align-items: center; gap: 8px; padding: 5px 10px;
      cursor: pointer; font-size: 0.82rem; color: var(--text);
    }
    .multi-select-option:hover { background: rgba(56, 189, 248, 0.08); }
    .multi-select-option input[type="checkbox"] {
      accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer;
    }
    .multi-select-actions {
      display: flex; gap: 6px; padding: 6px 10px; border-top: 1px solid var(--border);
    }
    .multi-select-actions button {
      background: transparent; border: 1px solid var(--border); color: var(--dim);
      border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; cursor: pointer;
    }
    .multi-select-actions button:hover { border-color: var(--accent); color: var(--text); }
    .stat { color: var(--dim); font-size: 0.78rem; margin-left: auto; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: var(--surface); color: var(--muted); text-align: left;
      padding: 8px 10px; font-weight: 600; text-transform: uppercase;
      font-size: 0.72rem; letter-spacing: 0.5px; cursor: pointer;
      user-select: none; white-space: nowrap; position: sticky; top: 0; z-index: 2;
    }
    th:hover { color: var(--accent); }
    th .arrow { font-size: 0.65rem; margin-left: 3px; }
    td { padding: 7px 10px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(56, 189, 248, 0.04); }

    /* Cells */
    .firm-cell { color: var(--accent); font-weight: 600; white-space: nowrap; }
    .title-cell { max-width: 380px; }
    .title-cell a { color: var(--text); text-decoration: none; }
    .title-cell a:hover { color: var(--accent); text-decoration: underline; }
    .loc-cell { color: var(--muted); white-space: nowrap; }
    .sen-cell { white-space: nowrap; }
    .comp-cell { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .fit-cell { text-align: center; white-space: nowrap; }
    .fit-high { color: #000; background: var(--green); border-radius: 4px; padding: 1px 7px; font-weight: 600; font-size: 0.85rem; }
    .fit-mid { color: #000; background: var(--yellow); border-radius: 4px; padding: 1px 7px; font-weight: 600; font-size: 0.85rem; }
    .fit-low { color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; font-size: 0.85rem; }
    .fit-none { color: var(--dim); font-size: 0.85rem; }
    .posted-cell { white-space: nowrap; color: var(--dim); }
    .tier-top { color: var(--green); font-weight: 600; font-size: 0.72rem; }
    .tier-adj { color: var(--purple); font-weight: 600; font-size: 0.72rem; }
    .badge-new {
      background: var(--yellow); color: #000; font-size: 0.6rem;
      padding: 1px 5px; border-radius: 3px; font-weight: 700;
      margin-left: 5px; vertical-align: middle;
    }
    .badge-applied {
      color: #000; background: var(--green); border-radius: 4px;
      padding: 1px 7px; font-weight: 600; font-size: 0.75rem;
      white-space: nowrap;
    }
    .badge-pending {
      color: var(--dim); font-size: 0.75rem;
    }
    .applied-cell { text-align: center; white-space: nowrap; }
    .apply-link {
      color: var(--accent); text-decoration: none; font-weight: 600;
      font-size: 0.75rem; white-space: nowrap;
    }
    .apply-link:hover { text-decoration: underline; }
    .no-link { color: var(--dim); font-size: 0.75rem; }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .filters input[type="text"] { width: 100%; }
      .filters { gap: 6px; }
      .multi-select { width: 100%; }
      .multi-select-btn { width: 100%; max-width: none; box-sizing: border-box; }
      .multi-select-panel { min-width: 100%; box-sizing: border-box; }
      .title-cell { max-width: 200px; }
    }
  </style>
</head>
<body>
  <h1>📊 FI Jobs Dashboard</h1>
  <div class="subtitle">
    <span id="total-count">—</span> roles · <span id="applied-count">0</span> applied · Last updated <span id="gen-date">—</span>
    · ≥$200k comp · No Analysts
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search title, location…" />
    <select id="firm-filter"><option value="">All Firms</option></select>
    <select id="seniority-filter"><option value="">All Seniority</option></select>
    <div class="multi-select" id="location-filter">
      <div class="multi-select-btn" id="location-btn">All Locations</div>
      <div class="multi-select-panel" id="location-panel">
        <input type="text" class="multi-select-search" id="location-search" placeholder="Search locations…" />
        <div class="multi-select-options" id="location-options"></div>
        <div class="multi-select-actions">
          <button onclick="locSelectAll()">All</button>
          <button onclick="locClearAll()">Clear</button>
        </div>
      </div>
    </div>
    <select id="tier-filter">
      <option value="">All Tiers</option>
      <option value="top">Top (Core FI)</option>
      <option value="adj">Adjacent</option>
    </select>
    <select id="comp-filter">
      <option value="0">Min Comp: Any</option>
      <option value="200000">$200k+</option>
      <option value="250000">$250k+</option>
      <option value="300000">$300k+</option>
      <option value="350000">$350k+</option>
    </select>
    <select id="fit-filter">
      <option value="0">Fit: Any</option>
      <option value="50">Fit ≥50</option>
      <option value="30">Fit ≥30</option>
      <option value="10">Fit ≥10</option>
    </select>
    <select id="applied-filter">
      <option value="">All Status</option>
      <option value="applied">Applied</option>
      <option value="not-applied">Not Applied</option>
    </select>
    <span class="stat" id="filtered-count"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="firm">Firm <span class="arrow"></span></th>
          <th data-col="title">Role <span class="arrow"></span></th>
          <th data-col="location">Location <span class="arrow"></span></th>
          <th data-col="seniority">Seniority <span class="arrow"></span></th>
          <th data-col="fit">Fit <span class="arrow"></span></th>
          <th data-col="minComp">Comp <span class="arrow"></span></th>
          <th data-col="tier">Tier <span class="arrow"></span></th>
          <th data-col="posted">Posted <span class="arrow"></span></th>
          <th data-col="applied">Applied <span class="arrow"></span></th>
          <th>Apply</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script>
let allRoles = [];
let sortCol = 'posted', sortDir = -1; // -1 = desc

const fmt = n => '$' + (n/1000).toFixed(0) + 'k';
const fmtDate = s => {
  if (!s) return '—';
  // s is MM/DD/YYYY
  const parts = s.split('/');
  if (parts.length === 3) {
    const d = new Date(parts[2], parts[0]-1, parts[1]);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 14) return diff + 'd ago';
    return s;
  }
  return s;
};
const postedSort = s => {
  if (!s) return 0;
  const parts = s.split('/');
  if (parts.length === 3) return new Date(parts[2], parts[0]-1, parts[1]).getTime();
  return 0;
};

let selectedLocations = new Set();

function locSelectAll() {
  const boxes = document.querySelectorAll('#location-options input[type="checkbox"]');
  const visible = Array.from(boxes).filter(b => b.closest('.multi-select-option').style.display !== 'none');
  const allChecked = visible.every(b => b.checked);
  visible.forEach(b => { b.checked = !allChecked; const v = b.value; if (!allChecked) selectedLocations.add(v); else selectedLocations.delete(v); });
  updateLocBtn();
  render();
}
function locClearAll() {
  selectedLocations.clear();
  document.querySelectorAll('#location-options input[type="checkbox"]').forEach(b => b.checked = false);
  updateLocBtn();
  render();
}
function updateLocBtn() {
  const btn = document.getElementById('location-btn');
  if (selectedLocations.size === 0) { btn.innerHTML = 'All Locations'; }
  else if (selectedLocations.size <= 2) { btn.innerHTML = [...selectedLocations].join(', ') + ' <span class="count-badge">' + selectedLocations.size + '</span>'; }
  else { btn.innerHTML = selectedLocations.size + ' locations <span class="count-badge">' + selectedLocations.size + '</span>'; }
}

function populateFilters() {
  const firms = [...new Set(allRoles.map(r => r.firm))].sort();
  const seniorities = [...new Set(allRoles.map(r => r.seniority))].sort();
  const locations = [...new Set(allRoles.map(r => r.location))].sort();
  const ff = document.getElementById('firm-filter');
  const sf = document.getElementById('seniority-filter');
  firms.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; ff.appendChild(o); });
  seniorities.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });

  // Build location multi-select options
  const opts = document.getElementById('location-options');
  locations.forEach(l => {
    const div = document.createElement('label');
    div.className = 'multi-select-option';
    div.innerHTML = `<input type="checkbox" value="${l}" /> ${l}`;
    div.querySelector('input').addEventListener('change', () => {
      if (div.querySelector('input').checked) selectedLocations.add(l); else selectedLocations.delete(l);
      updateLocBtn(); render();
    });
    opts.appendChild(div);
  });

  // Toggle panel
  const btn = document.getElementById('location-btn');
  const panel = document.getElementById('location-panel');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = panel.classList.contains('open');
    document.querySelectorAll('.multi-select-panel').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.multi-select-btn').forEach(b => b.classList.remove('open'));
    if (!isOpen) { panel.classList.add('open'); btn.classList.add('open'); document.getElementById('location-search').focus(); }
  });
  document.addEventListener('click', () => { panel.classList.remove('open'); btn.classList.remove('open'); });
  panel.addEventListener('click', (e) => e.stopPropagation());

  // Search filter
  document.getElementById('location-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#location-options .multi-select-option').forEach(opt => {
      opt.style.display = opt.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const firm = document.getElementById('firm-filter').value;
  const sen = document.getElementById('seniority-filter').value;
  const locs = selectedLocations;
  const tier = document.getElementById('tier-filter').value;
  const minComp = +document.getElementById('comp-filter').value;
  const minFit = +document.getElementById('fit-filter').value;
  const appliedFilter = document.getElementById('applied-filter').value;
  return allRoles.filter(r => {
    if (q && !r.title.toLowerCase().includes(q) && !r.location.toLowerCase().includes(q) && !r.firm.toLowerCase().includes(q)) return false;
    if (firm && r.firm !== firm) return false;
    if (sen && r.seniority !== sen) return false;
    if (locs.size > 0 && !locs.has(r.location)) return false;
    if (tier && r.tier !== tier) return false;
    if (r.minComp < minComp) return false;
    if ((r.fit||0) < minFit) return false;
    if (appliedFilter === 'applied' && !r.applied) return false;
    if (appliedFilter === 'not-applied' && r.applied) return false;
    return true;
  });
}

function render() {
  let rows = getFiltered();
  rows.sort((a, b) => {
    let av, bv;
    if (sortCol === 'posted') { av = postedSort(a.posted); bv = postedSort(b.posted); }
    else if (sortCol === 'minComp') { av = a.minComp; bv = b.minComp; }
else if (sortCol === 'fit') { av = a.fit || 0; bv = b.fit || 0; }
    else { av = (a[sortCol]||'').toLowerCase(); bv = (b[sortCol]||'').toLowerCase(); }
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });

  document.getElementById('filtered-count').textContent = `Showing ${rows.length} / ${allRoles.length}`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => `<tr>
    <td class="firm-cell">${r.firm}</td>
    <td class="title-cell"><a href="${r.link}" target="_blank" rel="noopener">${r.title}</a>${r.isNew ? '<span class="badge-new">NEW</span>' : ''}</td>
    <td class="loc-cell">${r.location}</td>
    <td class="sen-cell">${r.seniority}</td>
    <td class="fit-cell"><span class="fit-${(r.fit||0)>=50?'high':(r.fit||0)>=30?'mid':(r.fit||0)>=10?'low':'none'}">${r.fit||0}</span></td>
    <td class="comp-cell">${fmt(r.minComp)}</td>
    <td><span class="tier-${r.tier === 'adj' ? 'adj' : 'top'}">${r.tier === 'adj' ? 'ADJ' : 'TOP'}</span></td>
    <td class="posted-cell">${fmtDate(r.posted)}</td>
    <td class="applied-cell">${r.applied ? '<span class="badge-applied">✅ ' + (r.applied_date||'Applied') + '</span>' : '<span class="badge-pending">—</span>'}</td>
    <td>${r.link ? '<a class="apply-link" href="'+r.link+'" target="_blank" rel="noopener">Apply →</a>' : '<span class="no-link">—</span>'}</td>
  </tr>`).join('');

  // Update sort arrows
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.querySelector('.arrow').textContent = th.dataset.col === sortCol ? (sortDir === 1 ? '▲' : '▼') : '';
  });
}

// Sort click
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortCol === th.dataset.col) sortDir *= -1;
    else { sortCol = th.dataset.col; sortDir = 1; }
    render();
  });
});

// Filter events
['search','firm-filter','seniority-filter','tier-filter','comp-filter','fit-filter','applied-filter'].forEach(id => {
  document.getElementById(id).addEventListener(id === 'search' ? 'input' : 'change', render);
});

// Load data
fetch('data.json?v='+Date.now()).then(r => r.json()).then(d => {
  document.getElementById('total-count').textContent = d.total;
  document.getElementById('gen-date').textContent = d.generated;
  const appliedCount = d.roles.filter(r => r.applied).length;
  document.getElementById('applied-count').textContent = appliedCount;
  allRoles = d.roles;
  populateFilters();
  render();
}).catch(e => {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="9" style="padding:20px;text-align:center;color:#f87171">Failed to load data.json — ' + e.message + '</td></tr>';
});
</script>
</body>
</html>
